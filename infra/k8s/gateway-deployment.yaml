apiVersion: apps/v1
kind: Deployment
metadata:
  name: hookharbor-gateway
  labels:
    app: hookharbor-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hookharbor-gateway
  template:
    metadata:
      labels:
        app: hookharbor-gateway
    spec:
      containers:
      - name: gateway
        image: hookharbor-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: RABBITMQ_URL
          value: "amqp://guest:guest@rabbitmq-service:5672/"
        - name: REDIS_URL
          value: "redis://redis-service:6379/0"
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: hookharbor-gateway-service
spec:
  selector:
    app: hookharbor-gateway
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: LoadBalancer
