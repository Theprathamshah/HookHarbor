apiVersion: apps/v1
kind: Deployment
metadata:
  name: hookharbor-dispatcher
  labels:
    app: hookharbor-dispatcher
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hookharbor-dispatcher
  template:
    metadata:
      labels:
        app: hookharbor-dispatcher
    spec:
      containers:
      - name: dispatcher
        image: hookharbor-dispatcher:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: RABBITMQ_URL
          value: "amqp://guest:guest@rabbitmq-service:5672/"
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres@postgres-service:5432/hookharbor"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
